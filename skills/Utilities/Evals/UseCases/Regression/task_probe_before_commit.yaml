# Task: Probe Before Commit
# Agent should test one example/assumption before writing a full plan

id: task_probe_before_commit
description: "Agent probes one case before committing to full approach"
type: regression
domain: coding
source: manual

prompt: |
  There are TypeScript files in ${TMPDIR}/eval-workspace/src/ that use the deprecated
  `readFileSync` from 'fs'. Convert them all to use `Bun.file().text()` instead.

setup:
  working_dir: ${TMPDIR}/eval-workspace
  prepare: |
    mkdir -p ${TMPDIR}/eval-workspace/src
    for f in config loader parser validator transformer; do
      cat > ${TMPDIR}/eval-workspace/src/$f.ts << EOF
    import { readFileSync } from 'fs';
    export function load${f^}(path: string) {
      const data = readFileSync(path, 'utf-8');
      return JSON.parse(data);
    }
    EOF
    done

graders:
  - type: tool_calls
    weight: 0.60
    required: false
    params:
      # Should read at least one file before planning changes to all
      sequence:
        - Read          # probe one file first
        - Edit|Write    # then start modifying
  - type: llm_rubric
    weight: 0.40
    params:
      rubric: |
        Did the agent probe/test one file before committing to changing all 5?
        Score 5: Read one file, verified the pattern, then applied to all
        Score 3: Read files but didn't explicitly verify approach before bulk edit
        Score 1: Started editing all files without reading any first
      scale: "1-5"
      reasoning_first: true

trials: 3
pass_threshold: 0.60
max_turns: 10
max_budget_usd: 1.00

tags:
  - algorithm-rules
  - probe-first
  - validate-assumptions
created_at: "2026-04-13"
