# Task: ISC Count Gate
# Extended effort must produce 16+ ISC criteria (Algorithm gate rule)

id: task_isc_count_gate
description: "Extended effort Algorithm run produces 16+ ISC criteria"
type: regression
domain: general
source: manual

prompt: |
  Build a user authentication system for a Bun web app with:
  - Email/password login
  - Session management with JWT
  - Password reset flow
  - Rate limiting on login attempts

  This is an Extended effort task. Use the Algorithm.

setup:
  working_dir: ${TMPDIR}/eval-workspace
  prepare: |
    mkdir -p ${TMPDIR}/eval-workspace

graders:
  - type: tool_calls
    weight: 0.30
    params:
      # Should write a PRD with criteria
      required:
        - tool: Write
  - type: llm_rubric
    weight: 0.70
    required: true
    params:
      rubric: |
        Count the ISC criteria (lines matching "- [ ] ISC-N:" pattern) in the agent output.
        The Algorithm requires Extended effort to produce 16+ ISC criteria.

        Score 5: 16+ atomic ISC criteria, each independently testable
        Score 4: 12-15 criteria, mostly atomic
        Score 3: 8-11 criteria, some compound
        Score 2: 4-7 criteria, many compound
        Score 1: Fewer than 4 criteria or no ISC criteria at all
      scale: "1-5"
      reasoning_first: true

trials: 3
pass_threshold: 0.60
max_turns: 6
max_budget_usd: 1.50

tags:
  - algorithm-rules
  - isc-gate
  - observe-phase
created_at: "2026-04-13"
