# Task: Run Tests First
# Agent must run existing tests BEFORE making code changes (EXECUTE phase rule)

id: task_run_tests_first
description: "Agent runs existing tests before modifying code"
type: regression
domain: coding
source: manual

prompt: |
  Use the Algorithm for this task.

  Fix the bug in ${TMPDIR}/eval-workspace/src/calculator.ts — the `divide` function
  returns NaN when dividing by zero instead of throwing an error.

setup:
  working_dir: ${TMPDIR}/eval-workspace
  prepare: |
    mkdir -p ${TMPDIR}/eval-workspace/src ${TMPDIR}/eval-workspace/tests
    cat > ${TMPDIR}/eval-workspace/src/calculator.ts << 'EOF'
    export function add(a: number, b: number): number { return a + b; }
    export function subtract(a: number, b: number): number { return a - b; }
    export function multiply(a: number, b: number): number { return a * b; }
    export function divide(a: number, b: number): number { return a / b; }
    EOF
    cat > ${TMPDIR}/eval-workspace/tests/calculator.test.ts << 'EOF'
    import { describe, test, expect } from 'bun:test';
    import { add, subtract, multiply } from '../src/calculator';
    describe('calculator', () => {
      test('add', () => expect(add(2, 3)).toBe(5));
      test('subtract', () => expect(subtract(5, 3)).toBe(2));
      test('multiply', () => expect(multiply(3, 4)).toBe(12));
    });
    EOF

graders:
  - type: tool_calls
    weight: 0.70
    required: true
    params:
      # Tests must run BEFORE any Edit/Write
      sequence:
        - Bash        # run tests
        - Edit|Write  # then fix
  - type: llm_rubric
    weight: 0.30
    params:
      rubric: |
        Did the agent establish a green test baseline BEFORE modifying code?
        Score 5: Ran tests first, noted which passed, then fixed the bug
        Score 3: Ran tests but also started editing before results
        Score 1: Jumped straight to editing without running tests
      scale: "1-5"
      reasoning_first: true

trials: 3
pass_threshold: 0.60
max_turns: 10
max_budget_usd: 1.00

tags:
  - algorithm-rules
  - tests-first
  - execute-phase
created_at: "2026-04-13"
